name: Generate Daily Industry Report

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间上午 8:00) 自动执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 界面上手动点击 "Run workflow" 触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: Run script to generate and save report
        # 请确保您的脚本文件名与下方一致
        run: python 生成每日简报.py
        env:
          # 【重点】LLM 和 搜索 的 API Key
          GEMINI_LLM_API_KEY: ${{ secrets.GEMINI_LLM_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

          # 脚本中原本就需要的环境变量 (从 Secrets 读取)
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_AUTH_SECRET: ${{ secrets.CF_AUTH_SECRET }}
