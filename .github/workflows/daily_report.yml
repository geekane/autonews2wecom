name: 生成并发送行业日报

on:
  schedule:
    # 每天 UTC 23:00 = 北京时间早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 防止重复任务同时跑（可选但推荐）
    concurrency:
      group: daily-industry-report
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: Run script to generate and save report
        run: python 生成每日简报.py
        env:
          # LLM & 搜索 API
          GEMINI_LLM_API_KEY: ${{ secrets.GEMINI_LLM_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

          # 业务相关环境变量
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_AUTH_SECRET: ${{ secrets.CF_AUTH_SECRET }}
