name: Koyeb 自动重新部署保活

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分钟执行一次
  push:
    paths:
      - '.github/workflows/koyeb-api唤醒.yml'  # 每次修改这个 yml 文件并提交时，自动触发执行
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Koyeb CLI
        run: |
          # 下载并安装 Koyeb CLI
          curl -sSl https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
          # 使用正确的绝对路径，将二进制文件移动到系统路径
          sudo mv $HOME/.koyeb/bin/koyeb /usr/local/bin/koyeb
          # 验证安装
          koyeb version

      - name: 触发 Koyeb 服务重新部署
        env:
          # 从 GitHub Secrets 中读取 Token
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          echo "开始触发重新部署 willowy-alida/seven ..."
          # 触发真正的重部署动作
          koyeb service redeploy willowy-alida/seven
          echo "重新部署指令已发送！"
