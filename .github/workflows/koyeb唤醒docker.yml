name: koyeb唤醒镜像

on:
  push:
    branches: [ "main" ] # 每次你推送代码到 main 分支就会自动打包
  workflow_dispatch:     # 允许你在 Actions 页面手动点击打包

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: "geekane2025"
          # 注意：这里的密码是你 Docker Hub 的 Token，千万不要泄露
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 打包的镜像名称
          tags: geekane2025/koyeb-wake:latest
