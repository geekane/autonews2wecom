name: 每日网吧博主抖音视频信息爬虫

on:
  schedule:
    # 每天北京时间凌晨 1:00 运行 (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # 允许手动点按钮执行

jobs:
  scrape-and-upload:
    name: Scrape Douyin and Upload to Feishu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests pandas ffmpeg-python python-dotenv

      - name: Run Douyin Scraper Script
        # 这里非常关键：必须手动映射每一个变量
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: python 1109抖音.py --mode batch
